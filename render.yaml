services:
  - type: web
    name: smartbiz-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt && python backend/manage.py collectstatic --noinput && python backend/manage.py migrate"
    startCommand: "gunicorn --chdir backend smartbiz_backend.wsgi"
    envVars:
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: DATABASE_URL
        sync: false # Set this to your Supabase PostgreSQL connection string
      - key: SECRET_KEY
        generateValue: true # Render will generate a random secure secret key
      - key: GEMINI_API_KEY
        sync: false # Set this to your Google Gemini API key
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: TERMII_API_KEY
        sync: false # Set this to your Termii API key for SMS sending
